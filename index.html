<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#01010e" />
    <script>
      (() => {
        const storageKey = "sonara-hub-theme";
        const preferences = new Set([
          "system",
          "original",
          "light",
          "dark",
          "golden",
        ]);
        const themeColors = {
          dark: "#090a0d",
          golden: "#17100a",
          light: "#f6f2e9",
          original: "#050506",
        };
        try {
          let preference = localStorage.getItem(storageKey) || "original";
          if (!preferences.has(preference)) preference = "original";
          const effective =
            preference === "system"
              ? matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : preference;
          document.documentElement.dataset.themePreference = preference;
          document.documentElement.dataset.theme = effective;
          document.documentElement.style.colorScheme =
            effective === "light" ? "light" : "dark";
          const meta = document.querySelector('meta[name="theme-color"]');
          if (meta)
            meta.content = themeColors[effective] || themeColors.original;
        } catch {
          document.documentElement.dataset.theme = "original";
          document.documentElement.dataset.themePreference = "original";
        }
      })();
    </script>
    <link rel="shortcut icon" href="/brand/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/brand/favicon.svg" />
    <link
      rel="icon"
      type="image/png"
      sizes="48x48"
      href="/brand/favicon-48x48.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/brand/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/brand/favicon-16x16.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/brand/apple-touch-icon.png"
    />
    <link rel="manifest" href="/brand/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cinzel:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Serif+Display:ital@0;1&family=Montserrat:ital,wght@0,300;0,400;0,700;0,900;1,300;1,700&family=Oswald:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Raleway:ital,wght@0,300;0,400;0,700;1,300;1,400&family=Space+Grotesk:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Sonara Hub</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
