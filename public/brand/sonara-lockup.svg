<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 128" role="img" aria-labelledby="title desc">
  <title id="title">Sonara Hub logo</title>
  <desc id="desc">Sonara Hub wordmark with an aurora waveform symbol.</desc>
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#31f1dc" />
      <stop offset=".55" stop-color="#f7f9ff" />
      <stop offset="1" stop-color="#7d45ff" />
    </linearGradient>
    <filter id="soft" x="-40%" y="-50%" width="180%" height="220%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="620" height="128" rx="22" fill="none" />
  <g transform="translate(16 14)">
    <rect width="100" height="100" rx="24" fill="#08080a" />
    <path
      d="M10 62c12 0 18-8 30-6 9 2 11 14 21 15 11 1 14-20 22-29 8 4 9 18 20 16 6-1 9-5 16-4-13-8-20 2-30-1-13-3-16-27-25-48-2 27-10 42-20 47-10 5-17-6-29-2-8 2-13 9-15 9Z"
      fill="url(#line)"
      filter="url(#soft)"
    />
    <path d="M31 54c19-17 35-7 46-52" fill="none" stroke="#20efda" stroke-width="9" stroke-linecap="round" opacity=".38" />
    <rect x=".7" y=".7" width="98.6" height="98.6" rx="23" fill="none" stroke="#ffffff" stroke-opacity=".14" stroke-width="1.4" />
  </g>
  <g fill="#f7f8fb" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="148" y="62" font-size="38" font-weight="650" letter-spacing="12">SONARA</text>
    <text x="149" y="98" font-size="20" font-weight="760" letter-spacing="13" fill="#b9c2d1">HUB</text>
  </g>
  <path d="M149 78h92" stroke="#31f1dc" stroke-width="2" opacity=".75" />
  <path d="M356 78h92" stroke="#7d45ff" stroke-width="2" opacity=".75" />
</svg>
